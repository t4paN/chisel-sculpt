name: Linux Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    container: ubuntu:20.04

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools and dependencies
        run: |
          apt-get update
          apt-get install -y build-essential cmake git wget file \
            libglfw3-dev libgl-dev libglx-dev libegl-dev \
            libx11-dev libxfixes-dev \
            python3 libfuse2 patchelf

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/lib
          cp build/chisel AppDir/usr/bin/

          mkdir -p AppDir/usr/share/applications
          cp packaging/chisel.desktop AppDir/usr/share/applications/chisel.desktop

          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp assets/chisel-icon.png AppDir/usr/share/icons/hicolor/256x256/apps/chisel.png

      - name: Bundle shared libraries
        run: |
          cd AppDir
          for lib in $(ldd usr/bin/chisel | grep '=> /' | awk '{print $3}'); do
            case "$lib" in
              */libGL.so*|*/libEGL.so*|*/libGLX.so*|*/libGLdispatch.so*|*/libX11.so*|*/libxcb*.so*|*/libXext.so*|*/libXrandr.so*|*/libXinerama.so*|*/libXcursor.so*|*/libXi.so*|*/libXfixes.so*|*/libXrender.so*|*/libXau.so*|*/libXdmcp.so*)
                ;;
              */libc.so*|*/libpthread.so*|*/libdl.so*|*/librt.so*|*/libm.so*|*/ld-linux*)
                ;;
              *)
                cp -v "$lib" usr/lib/
                ;;
            esac
          done

      - name: Create AppRun
        run: |
          cp packaging/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun
          cp AppDir/usr/share/applications/chisel.desktop AppDir/
          cp AppDir/usr/share/icons/hicolor/256x256/apps/chisel.png AppDir/chisel.png

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir Chisel-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chisel-linux-x64
          path: Chisel-x86_64.AppImage

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Chisel-x86_64.AppImage
