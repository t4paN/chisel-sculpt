name: Windows Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      - name: Install GLFW (static)
        run: C:\vcpkg\vcpkg.exe install glfw3:x64-windows-static

      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows-static
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release

      - name: Locate binary
        shell: pwsh
        run: Get-ChildItem -Recurse build -Filter chisel.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chisel-windows-x64
          path: build/Release/chisel.exe

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path build/Release/chisel.exe -DestinationPath chisel-windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: chisel-windows-x64.zip
          generate_release_notes: true
